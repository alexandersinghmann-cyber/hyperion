<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Training Block: Apr 11–16</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg2: #111111;
            --card: #1a1a1a;
            --card-hover: #1f1f1f;
            --border: #2a2a2a;
            --border-light: #333;
            --text: #f0f0f0;
            --text-dim: #777;
            --text-mid: #999;
            --orange: #F7931A;
            --orange-dim: rgba(247,147,26,0.15);
            --orange-glow: rgba(247,147,26,0.3);
            --green: #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --red: #ef4444;
            --warmup: #a78bfa;
            --warmup-dim: rgba(167,139,250,0.12);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
            min-height: 100dvh;
        }

        .app {
            max-width: 540px;
            margin: 0 auto;
            padding: 0 16px 110px;
        }

        /* ── Header ── */
        .header {
            padding: 24px 0 20px;
            text-align: center;
            position: relative;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--orange), transparent);
            opacity: 0.3;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--orange), #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 4px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── KPIs ── */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }
        .kpi {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 10px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .kpi::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--orange), transparent);
            opacity: 0.5;
        }
        .kpi-value {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
        }
        .kpi-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-top: 2px;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 4px 0 12px;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            flex: 1;
            min-width: 0;
            padding: 10px 6px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            position: relative;
        }
        .tab .tab-day {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            display: block;
        }
        .tab .tab-num {
            display: block;
            font-size: 16px;
            font-weight: 800;
            margin-top: 1px;
        }
        .tab.active {
            background: var(--orange);
            color: #fff;
            border-color: var(--orange);
            box-shadow: 0 2px 16px var(--orange-glow);
        }
        .tab.active .tab-day { opacity: 1; }
        .tab .tab-dot {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 14px;
            height: 14px;
            background: var(--green);
            border-radius: 50%;
            border: 2px solid var(--bg);
            display: none;
        }
        .tab.completed .tab-dot { display: block; }
        .tab.partial { border-color: var(--orange); border-style: dashed; }

        /* ── Day header ── */
        .day-header {
            margin-bottom: 12px;
        }
        .day-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }
        .day-subtitle {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* ── Exercise card ── */
        .exercise-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .exercise-card.done {
            border-color: var(--green);
            background: linear-gradient(135deg, var(--card), rgba(34,197,94,0.04));
        }

        .exercise-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
        }

        .exercise-check {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            cursor: pointer;
        }
        .exercise-check svg { width: 14px; height: 14px; stroke: transparent; stroke-width: 3; fill: none; }
        .exercise-card.done .exercise-check {
            background: var(--green);
            border-color: var(--green);
            box-shadow: 0 0 12px rgba(34,197,94,0.3);
        }
        .exercise-card.done .exercise-check svg { stroke: #fff; }

        .exercise-info { flex: 1; min-width: 0; }
        .exercise-name {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }
        .exercise-rx {
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 500;
            margin-top: 1px;
        }
        .exercise-card.done .exercise-name { color: var(--green); }

        .exercise-chevron {
            color: var(--text-dim);
            font-size: 12px;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .exercise-card.expanded .exercise-chevron { transform: rotate(180deg); }

        .tag {
            display: inline-block;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            letter-spacing: 0.3px;
            margin-left: 6px;
            vertical-align: middle;
            text-transform: uppercase;
        }
        .tag-shoulder { background: var(--orange-dim); color: var(--orange); }
        .tag-rehab { background: var(--green-dim); color: var(--green); }

        /* ── Exercise detail ── */
        .exercise-detail {
            display: none;
            padding: 0 14px 14px;
        }
        .exercise-card.expanded .exercise-detail { display: block; }

        /* Set rows */
        .sets-container { margin-bottom: 8px; }

        .set-row-header {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 32px;
            gap: 6px;
            margin-bottom: 6px;
        }
        .set-col-label {
            font-size: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 700;
            text-align: center;
        }

        .set-row {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 32px;
            gap: 6px;
            align-items: center;
            margin-bottom: 5px;
            animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .set-badge {
            font-size: 11px;
            font-weight: 800;
            text-align: center;
            padding: 6px 0;
            border-radius: 6px;
            background: var(--bg2);
            color: var(--text-mid);
        }
        .set-badge.warmup {
            background: var(--warmup-dim);
            color: var(--warmup);
            font-size: 9px;
            letter-spacing: 0.3px;
        }

        .set-input {
            width: 100%;
            padding: 9px 6px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg2);
            color: var(--text);
            font-size: 15px;
            text-align: center;
            font-weight: 600;
            -webkit-appearance: none;
            transition: border-color 0.15s;
        }
        .set-input:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 2px var(--orange-dim);
        }
        .set-input::placeholder {
            color: #444;
            font-weight: 400;
            font-size: 13px;
        }
        .set-input.warmup-input {
            border-color: rgba(167,139,250,0.2);
        }
        .set-input.warmup-input:focus {
            border-color: var(--warmup);
            box-shadow: 0 0 0 2px var(--warmup-dim);
        }

        .set-delete {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: none;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.15s;
            padding: 0;
        }
        .set-delete:hover { background: rgba(239,68,68,0.1); color: var(--red); }
        .set-delete.hidden { visibility: hidden; }

        /* Add set buttons */
        .add-set-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .add-set-btn {
            flex: 1;
            padding: 8px;
            border: 1px dashed var(--border-light);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .add-set-btn:active {
            transform: scale(0.97);
        }
        .add-set-btn.add-working:hover {
            border-color: var(--orange);
            color: var(--orange);
            background: var(--orange-dim);
        }
        .add-set-btn.add-warmup:hover {
            border-color: var(--warmup);
            color: var(--warmup);
            background: var(--warmup-dim);
        }
        .add-set-btn .plus {
            font-size: 15px;
            font-weight: 400;
            line-height: 1;
        }

        /* Target + notes */
        .target-box {
            margin-top: 10px;
            padding: 8px 10px;
            background: var(--orange-dim);
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--orange);
            font-size: 12px;
            color: var(--orange);
            font-weight: 600;
        }

        .notes-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg2);
            color: var(--text);
            font-size: 13px;
            font-family: inherit;
            resize: none;
            height: 38px;
            margin-top: 8px;
            transition: border-color 0.15s, height 0.15s;
        }
        .notes-input:focus {
            outline: none;
            border-color: var(--orange);
            height: 64px;
        }
        .notes-input::placeholder { color: #444; }

        /* ── Report button ── */
        .report-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--orange), #f59e0b);
            color: #000;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 24px var(--orange-glow), 0 0 0 1px rgba(247,147,26,0.2);
            z-index: 100;
            transition: all 0.15s;
            letter-spacing: -0.2px;
        }
        .report-btn:active {
            transform: translateX(-50%) scale(0.96);
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 200;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px 20px 0 0;
            padding: 24px 20px;
            width: 100%;
            max-width: 540px;
            max-height: 80dvh;
            overflow-y: auto;
        }
        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border-light);
            border-radius: 2px;
            margin: 0 auto 16px;
        }
        .modal h2 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .modal pre {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            font-size: 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 50dvh;
            overflow-y: auto;
            line-height: 1.7;
            color: var(--text-mid);
        }
        .modal-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }
        .modal-actions button {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.15s;
        }
        .modal-actions button:active { transform: scale(0.97); }
        .btn-copy {
            background: linear-gradient(135deg, var(--orange), #f59e0b);
            color: #000;
        }
        .btn-close {
            background: var(--border);
            color: var(--text);
        }

        /* ── Responsive ── */
        @media (max-width: 380px) {
            .tab .tab-num { font-size: 14px; }
            .set-input { font-size: 14px; padding: 8px 4px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>Training Block</h1>
        <div class="subtitle">Apr 11 – 16, 2026</div>
    </div>

    <div class="kpi-row">
        <div class="kpi">
            <div class="kpi-value" id="kpi-done">0/6</div>
            <div class="kpi-label">Sessions</div>
        </div>
        <div class="kpi">
            <div class="kpi-value" id="kpi-exercises">0</div>
            <div class="kpi-label">Exercises</div>
        </div>
        <div class="kpi">
            <div class="kpi-value" id="kpi-sets">0</div>
            <div class="kpi-label">Total Sets</div>
        </div>
    </div>

    <div class="tabs" id="tabs"></div>
    <div id="day-content"></div>

    <button class="report-btn" onclick="generateReport()">Generate Report</button>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-handle"></div>
            <h2>Session Report</h2>
            <pre id="report-text"></pre>
            <div class="modal-actions">
                <button class="btn-copy" onclick="copyReport()">Copy to Clipboard</button>
                <button class="btn-close" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
const DAYS = [
    {
        id: 1, label: "Sat", num: "01", title: "Squat Heavy",
        subtitle: "Saturday Apr 11 \u00b7 ~60 min",
        exercises: [
            { name: "Back Squat", sets: 4, reps: "5", load: "92.5 kg", target: "4\u00d75 clean \u2192 95 kg next heavy day" },
            { name: "Leg Press", sets: 3, reps: "10-12", load: "380 lb", target: "Hit 12s \u2192 400 lb" },
            { name: "DB RDL", sets: 3, reps: "8-10", load: "30 kg/hand", target: "Hit 10s \u2192 32 kg" },
            { name: "Hamstring Curl", sets: 3, reps: "10-12", load: "36 kg", target: "Fill to 12" },
            { name: "Calf Raise", sets: 3, reps: "12-15", load: "90 lb", target: "15s \u2192 increase load" },
            { name: "Pallof Press", sets: 2, reps: "12/side", load: "35 lb", target: "2-sec hold at extension" }
        ]
    },
    {
        id: 2, label: "Sun", num: "02", title: "Upper A: Pull Heavy",
        subtitle: "Sunday Apr 12 \u00b7 ~65 min",
        exercises: [
            { name: "Lat Pulldown", sets: 4, reps: "8-10", load: "65 kg", target: "10s at 65 \u2192 70 kg" },
            { name: "Seated Row", sets: 4, reps: "8-10", load: "120 lb", target: "10s \u2192 125 lb" },
            { name: "DB Incline Bench", sets: 3, reps: "8-10", load: "22 kg", target: "Pain-free 10s \u2192 24 kg", shoulder: true },
            { name: "Face Pull", sets: 3, reps: "12-15", load: "35 lb", target: "15s \u2192 37.5 lb" },
            { name: "DB Curl", sets: 3, reps: "10-12", load: "12 kg", target: "12s \u2192 14 kg" },
            { name: "Lateral Raise", sets: 3, reps: "12-15", load: "6 kg", target: "15 clean \u2192 7 kg" },
            { name: "Ext. Rotation", sets: 2, reps: "15", load: "Light", target: "Pain-free, never fatiguing", rehab: true }
        ]
    },
    {
        id: 3, label: "Mon", num: "03", title: "Deadlift Heavy",
        subtitle: "Monday Apr 13 \u00b7 ~60 min",
        exercises: [
            { name: "Deadlift", sets: 4, reps: "5", load: "110 kg", target: "4\u00d75 clean \u2192 112.5 kg" },
            { name: "Back Squat (light)", sets: 3, reps: "6-8", load: "85 kg", target: "8,8,8 \u2192 87.5 kg" },
            { name: "Back Extension", sets: 3, reps: "12-15", load: "+10 lb", target: "15s \u2192 +15 lb" },
            { name: "Hamstring Curl", sets: 3, reps: "10-12", load: "36 kg", target: "Fill to 12" },
            { name: "Cable Crunch", sets: 3, reps: "12-15", load: "80 lb", target: "15 reps \u2192 85 lb" }
        ]
    },
    {
        id: 4, label: "Tue", num: "04", title: "Core + Rehab",
        subtitle: "Tuesday Apr 14 \u00b7 ~35 min \u00b7 Active Recovery",
        exercises: [
            { name: "Pallof Press", sets: 3, reps: "12/side", load: "35 lb", target: "2-sec hold, brace like squat" },
            { name: "Dead Bug", sets: 3, reps: "8/side", load: "BW", target: "3-sec lowering" },
            { name: "Cable Crunch", sets: 3, reps: "12-15", load: "80 lb", target: "Control the negative" },
            { name: "Bird Dog Row", sets: 3, reps: "10/side", load: "8-10 kg", target: "Hips square, no rotation" },
            { name: "Face Pull (light)", sets: 3, reps: "15", load: "30 lb", target: "Rehab tempo", rehab: true },
            { name: "Ext. Rotation", sets: 3, reps: "15", load: "Light", target: "Zero fatigue", rehab: true },
            { name: "Band Pull-Apart", sets: 3, reps: "15", load: "Light", target: "Easy, posture work", rehab: true }
        ]
    },
    {
        id: 5, label: "Wed", num: "05", title: "Squat Medium",
        subtitle: "Wednesday Apr 15 \u00b7 ~60 min",
        exercises: [
            { name: "Back Squat", sets: 4, reps: "6", load: "87.5 kg", target: "4\u00d76 clean \u2192 90 kg" },
            { name: "DB RDL", sets: 3, reps: "8-10", load: "30 kg/hand", target: "Hit 10s" },
            { name: "Leg Press", sets: 3, reps: "10-12", load: "360 lb", target: "Volume, not grinding" },
            { name: "Hamstring Curl", sets: 3, reps: "10-12", load: "36 kg", target: "Consistency" },
            { name: "Calf Raise", sets: 3, reps: "12-15", load: "90 lb", target: "Maintain" },
            { name: "Pallof Press", sets: 2, reps: "12/side", load: "35 lb", target: "Same cues" }
        ]
    },
    {
        id: 6, label: "Thu", num: "06", title: "Upper B: Pull Volume",
        subtitle: "Thursday Apr 16 \u00b7 ~65 min",
        exercises: [
            { name: "Seated Row", sets: 4, reps: "10-12", load: "115 lb", target: "Higher reps, lighter" },
            { name: "DB Incline Bench", sets: 3, reps: "10-12", load: "20 kg", target: "Lighter, groove pattern", shoulder: true },
            { name: "Lat Pulldown", sets: 3, reps: "10-12", load: "60 kg", target: "Stretch & squeeze" },
            { name: "Face Pull", sets: 3, reps: "12-15", load: "35 lb", target: "15 reps" },
            { name: "DB Curl", sets: 3, reps: "10-12", load: "12 kg", target: "12s \u2192 14 kg" },
            { name: "Lateral Raise", sets: 3, reps: "12-15", load: "6 kg", target: "15 clean" },
            { name: "Ext. Rotation", sets: 2, reps: "15", load: "Light", target: "Close out block", rehab: true }
        ]
    }
];

// ── State ──
let state = {
    activeDay: 0,
    days: DAYS.map(day => ({
        ...day,
        exercises: day.exercises.map(ex => ({
            ...ex,
            done: false,
            expanded: false,
            sets_data: Array.from({length: ex.sets}, (_, i) => ({
                id: i, type: 'working', weight: '', reps: ''
            })),
            nextId: ex.sets,
            notes: ''
        }))
    }))
};

// ── Render ──
function renderTabs() {
    const el = document.getElementById('tabs');
    el.innerHTML = state.days.map((d, i) => {
        const allDone = d.exercises.every(e => e.done);
        const someDone = d.exercises.some(e => e.done || e.sets_data.some(s => s.weight || s.reps));
        let cls = 'tab';
        if (i === state.activeDay) cls += ' active';
        if (allDone) cls += ' completed';
        else if (someDone) cls += ' partial';
        return `<div class="${cls}" onclick="switchDay(${i})">
            <span class="tab-day">${d.label}</span>
            <span class="tab-num">${d.num}</span>
            <span class="tab-dot"></span>
        </div>`;
    }).join('');
}

function switchDay(i) {
    state.activeDay = i;
    renderTabs();
    renderDay();
}

function renderDay() {
    const day = state.days[state.activeDay];
    const el = document.getElementById('day-content');
    let h = `<div class="day-header">
        <div class="day-title">${day.title}</div>
        <div class="day-subtitle">${day.subtitle}</div>
    </div>`;

    day.exercises.forEach((ex, ei) => {
        let cls = 'exercise-card';
        if (ex.done) cls += ' done';
        if (ex.expanded) cls += ' expanded';

        let tags = '';
        if (ex.shoulder) tags += '<span class="tag tag-shoulder">Shoulder</span>';
        if (ex.rehab) tags += '<span class="tag tag-rehab">Rehab</span>';

        const workingSets = ex.sets_data.filter(s => s.type === 'working');
        const warmupSets = ex.sets_data.filter(s => s.type === 'warmup');
        const filledSets = ex.sets_data.filter(s => s.weight || s.reps).length;
        const totalSets = ex.sets_data.length;
        const setsLabel = filledSets > 0 ? `${filledSets}/${totalSets} logged` : `${ex.sets}\u00d7${ex.reps} @ ${ex.load}`;

        h += `<div class="${cls}">
            <div class="exercise-header" onclick="toggleExpand(${ei})">
                <div class="exercise-check" onclick="event.stopPropagation();toggleDone(${ei})">
                    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div class="exercise-info">
                    <div class="exercise-name">${ex.name}${tags}</div>
                    <div class="exercise-rx">${setsLabel}</div>
                </div>
                <div class="exercise-chevron">\u25BE</div>
            </div>
            <div class="exercise-detail">
                <div class="sets-container">
                    <div class="set-row-header">
                        <div class="set-col-label">Set</div>
                        <div class="set-col-label">Weight</div>
                        <div class="set-col-label">Reps</div>
                        <div></div>
                    </div>
                    ${ex.sets_data.map((s, si) => {
                        const isWarmup = s.type === 'warmup';
                        const badgeCls = isWarmup ? 'set-badge warmup' : 'set-badge';
                        const inputCls = isWarmup ? 'set-input warmup-input' : 'set-input';
                        const badgeText = isWarmup ? 'W' : `${si + 1 - warmupSets.filter((_,wi) => ex.sets_data.indexOf(warmupSets[wi]) < si + ex.sets_data.indexOf(ex.sets_data[0])).length}`;
                        // Compute proper working set number
                        let workingNum = 0;
                        let warmupNum = 0;
                        for (let k = 0; k <= si; k++) {
                            if (ex.sets_data[k].type === 'warmup') warmupNum++;
                            else workingNum++;
                        }
                        const label = isWarmup ? 'W' + warmupNum : 'S' + workingNum;
                        const canDelete = isWarmup || si >= ex.sets;

                        return `<div class="set-row">
                            <div class="${badgeCls}">${label}</div>
                            <input class="${inputCls}" type="text" inputmode="decimal"
                                placeholder="${ex.load}"
                                value="${s.weight}"
                                onchange="updateSet(${ei},${si},'weight',this.value)"
                                onfocus="this.select()">
                            <input class="${inputCls}" type="text" inputmode="numeric"
                                placeholder="${ex.reps}"
                                value="${s.reps}"
                                onchange="updateSet(${ei},${si},'reps',this.value)"
                                onfocus="this.select()">
                            <button class="set-delete ${canDelete ? '' : 'hidden'}"
                                onclick="removeSet(${ei},${si})">\u00d7</button>
                        </div>`;
                    }).join('')}
                </div>
                <div class="add-set-row">
                    <button class="add-set-btn add-warmup" onclick="addSet(${ei},'warmup')">
                        <span class="plus">+</span> Warmup
                    </button>
                    <button class="add-set-btn add-working" onclick="addSet(${ei},'working')">
                        <span class="plus">+</span> Working Set
                    </button>
                </div>
                <div class="target-box">${ex.target}</div>
                <textarea class="notes-input"
                    placeholder="Notes \u2014 pain, RPE, form cues..."
                    onchange="updateNotes(${ei},this.value)"
                >${ex.notes}</textarea>
            </div>
        </div>`;
    });

    el.innerHTML = h;
    updateKPIs();
}

// ── Actions ──
function toggleDone(ei) {
    state.days[state.activeDay].exercises[ei].done = !state.days[state.activeDay].exercises[ei].done;
    renderDay(); renderTabs();
}

function toggleExpand(ei) {
    state.days[state.activeDay].exercises[ei].expanded = !state.days[state.activeDay].exercises[ei].expanded;
    renderDay();
}

function updateSet(ei, si, field, value) {
    state.days[state.activeDay].exercises[ei].sets_data[si][field] = value;
    updateKPIs();
}

function updateNotes(ei, value) {
    state.days[state.activeDay].exercises[ei].notes = value;
}

function addSet(ei, type) {
    const ex = state.days[state.activeDay].exercises[ei];
    const newSet = { id: ex.nextId++, type, weight: '', reps: '' };
    if (type === 'warmup') {
        // Insert warmups at the beginning
        const firstWorking = ex.sets_data.findIndex(s => s.type === 'working');
        ex.sets_data.splice(firstWorking >= 0 ? firstWorking : 0, 0, newSet);
    } else {
        ex.sets_data.push(newSet);
    }
    renderDay();
}

function removeSet(ei, si) {
    const ex = state.days[state.activeDay].exercises[ei];
    ex.sets_data.splice(si, 1);
    renderDay();
}

function updateKPIs() {
    let sessions = 0, exercises = 0, sets = 0;
    state.days.forEach(d => {
        if (d.exercises.every(e => e.done)) sessions++;
        d.exercises.forEach(ex => {
            if (ex.done) exercises++;
            ex.sets_data.forEach(s => {
                if (s.weight || s.reps) sets++;
            });
        });
    });
    document.getElementById('kpi-done').textContent = `${sessions}/6`;
    document.getElementById('kpi-exercises').textContent = exercises;
    document.getElementById('kpi-sets').textContent = sets;
}

// ── Report ──
function generateReport() {
    let lines = [];
    const day = state.days[state.activeDay];
    const hasData = day.exercises.some(ex =>
        ex.done || ex.sets_data.some(s => s.weight || s.reps) || ex.notes
    );

    if (!hasData) {
        state.days.forEach(d => {
            const dHas = d.exercises.some(ex =>
                ex.done || ex.sets_data.some(s => s.weight || s.reps) || ex.notes
            );
            if (dHas) { lines.push(fmtDay(d)); lines.push(''); }
        });
        if (!lines.length) lines.push('No data logged yet.');
    } else {
        lines.push(fmtDay(day));
    }

    document.getElementById('report-text').textContent = lines.join('\n');
    document.getElementById('modal').classList.add('show');
}

function fmtDay(day) {
    let l = [`## ${day.title}`, day.subtitle, ''];
    day.exercises.forEach(ex => {
        const s = ex.done ? '\u2705' : '\u2B1C';
        const warmups = ex.sets_data.filter(s => s.type === 'warmup' && (s.weight || s.reps));
        const working = ex.sets_data.filter(s => s.type === 'working' && (s.weight || s.reps));

        let parts = [];
        if (warmups.length) {
            parts.push('Warmup: ' + warmups.map(s => `${s.weight||'?'} x ${s.reps||'?'}`).join(', '));
        }
        if (working.length) {
            parts.push(working.map(s => `${s.weight||'?'} x ${s.reps||'?'}`).join(' / '));
        }

        if (parts.length) {
            l.push(`${s} ${ex.name}: ${parts.join(' | ')}`);
        } else {
            l.push(`${s} ${ex.name}: ${ex.sets}x${ex.reps} @ ${ex.load} (prescribed)`);
        }
        if (ex.notes) l.push(`   Note: ${ex.notes}`);
    });
    return l.join('\n');
}

function copyReport() {
    const text = document.getElementById('report-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy to Clipboard', 1500);
    }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        const btn = document.querySelector('.btn-copy');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy to Clipboard', 1500);
    });
}

function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// Init
renderTabs(); renderDay();
</script>
</body>
</html>
